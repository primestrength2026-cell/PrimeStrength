<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIME STRENGTH</title>

<style>

:root{
--gold:#FFD700;
--silver:#C0C0C0;
--black:#000;
}

body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(270deg,#000,#111,#000);
background-size:600% 600%;
animation:bgMove 15s linear infinite;
}

@keyframes bgMove{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

header{
text-align:center;
padding:40px;
font-size:42px;
color:gold;
font-weight:bold;
letter-spacing:3px;
}

.motivation{
text-align:center;
color:silver;
margin-bottom:20px;
}

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
padding:12px;
width:300px;
border-radius:6px;
border:none;
}

.container{
padding:20px;
}

.sport{
margin-bottom:40px;
}

.sport h2{
color:gold;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.product{
background:#111;
border:1px solid silver;
border-radius:10px;
padding:10px;
text-align:center;
transition:0.4s;
}

.product:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}

.product img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

.price{
color:gold;
margin:8px 0;
font-weight:bold;
}

.live-btn{
padding:10px 15px;
border:none;
cursor:pointer;
font-weight:bold;
color:black;
background:linear-gradient(90deg,gold,silver,gold);
background-size:300%;
animation:btnMove 3s linear infinite;
border-radius:6px;
}

@keyframes btnMove{
0%{background-position:0%}
100%{background-position:300%}
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
padding:15px 25px;
border-radius:50px;
text-decoration:none;
color:black;
font-weight:bold;
background:linear-gradient(90deg,gold,silver,gold);
background-size:300%;
animation:btnMove 3s linear infinite;
}

</style>
</head>

<body>

<header>PRIME STRENGTH</header>

<div class="motivation">
Train Hard • Stay Strong • Become Prime
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">
</div>

<div class="container" id="shop"></div>

<a class="whatsapp" href="https://wa.me/96171710258" target="_blank">
WhatsApp Order
</a>

<script>

const productsData = {

Boxing:[

{name:"Boxing Product 1",price:"28$",image:"https://i.supaimg.com/2457e6ea-61a4-415b-9cd5-9de83ac0509b/3982d955-4400-4429-a10b-9d1683eea32f.jpg"},

{name:"Boxing Product 2",price:"25$",image:"https://i.supaimg.com/2457e6ea-61a4-415b-9cd5-9de83ac0509b/5b316a9f-513b-4fa8-9297-10e6251185f9.png"},

{name:"Boxing Product 3",price:"25$",image:"https://i.supaimg.com/2457e6ea-61a4-415b-9cd5-9de83ac0509b/923a2948-3667-46ec-be0d-de8a6f49235a.jpg"},

{name:"Boxing Product 4",price:"25$",image:"https://i.supaimg.com/2457e6ea-61a4-415b-9cd5-9de83ac0509b/23db39a3-8e58-410d-b30b-2fb0bc310b39.jpg"},

{name:"Boxing Product 5",price:"25$",image:"https://i.supaimg.com/2457e6ea-61a4-415b-9cd5-9de83ac0509b/3336d7ea-74c9-4733-88a1-76c2ad9909b4.jpg"},

{name:"Boxing Product 6",price:"25$",image:"https://i.supaimg.com/2457e6ea-61a4-415b-9cd5-9de83ac0509b/c102aff8-89d4-47b1-9a43-ccd77c1135f3.jpg"},

{name:"Boxing Product 7",price:"25$",image:"https://i.supaimg.com/2457e6ea-61a4-415b-9cd5-9de83ac0509b/7d44520d-8fc8-4594-94b3-07fa0fe1e95a.jpg"},

{name:"Boxing Product 8",price:"25$",image:"https://i.supaimg.com/2457e6ea-61a4-415b-9cd5-9de83ac0509b/99a4c30b-4ce1-4ed8-ac50-4202c377b730.jpg"},

{name:"Boxing Product 9",price:"25$",image:"https://i.supaimg.com/2457e6ea-61a4-415b-9cd5-9de83ac0509b/3b529be9-8c10-44ad-8ab6-b0d65be3ade3.jpg"},

{name:"Boxing Product 10",price:"25$",image:"https://i.supaimg.com/2457e6ea-61a4-415b-9cd5-9de83ac0509b/f72628ca-6668-4697-a516-8df017cb8ddf.jpg"}

]

};

const shop=document.getElementById("shop");

Object.keys(productsData).forEach(sport=>{

let div=document.createElement("div");
div.className="sport";

let html=`<h2>${sport}</h2><div class="products">`;

productsData[sport].forEach(product=>{

html+=`
<div class="product">

<img src="${product.image}">

<h4>${product.name}</h4>

<div class="price">${product.price}</div>

<button class="live-btn"
onclick="order('${product.name}')">
Order
</button>

</div>
`;

});

html+=`</div>`;
div.innerHTML=html;
shop.appendChild(div);

});

function order(product){
window.open(
`https://wa.me/96171710258?text=Hello I want ${product} from PRIME STRENGTH`
);
}

function searchProduct(){
let input=document.getElementById("search").value.toLowerCase();
let products=document.querySelectorAll(".product");

products.forEach(p=>{
p.style.display=
p.innerText.toLowerCase().includes(input)
? "block":"none";
});
}

</script>

</body>
</html>
