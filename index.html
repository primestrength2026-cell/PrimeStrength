<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRIME STRENGTH</title>

<style>

:root{
--gold:#FFD700;
--silver:#C0C0C0;
--black:#000;
}

body{
margin:0;
font-family:Arial;
color:white;
background:linear-gradient(270deg,#000,#111,#000);
background-size:600% 600%;
animation:bgMove 15s linear infinite;
}

@keyframes bgMove{
0%{background-position:0%}
50%{background-position:100%}
100%{background-position:0%}
}

header{
text-align:center;
padding:40px;
font-size:42px;
color:gold;
font-weight:bold;
}

.motivation{
text-align:center;
color:silver;
margin-bottom:20px;
}

.search-box{
text-align:center;
margin:20px;
}

.search-box input{
padding:12px;
width:300px;
border-radius:6px;
border:none;
}

.container{
padding:20px;
}

.sport{
margin-bottom:40px;
}

.sport h2{
color:gold;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.product{
background:#111;
border:1px solid silver;
border-radius:10px;
padding:10px;
text-align:center;
transition:0.4s;
}

.product:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}

.product img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

.price{
color:gold;
margin:8px 0;
font-weight:bold;
}

.live-btn{
padding:10px 15px;
border:none;
cursor:pointer;
font-weight:bold;
color:black;
background:linear-gradient(90deg,gold,silver,gold);
background-size:300%;
animation:btnMove 3s linear infinite;
border-radius:6px;
}

@keyframes btnMove{
0%{background-position:0%}
100%{background-position:300%}
}

.whatsapp{
position:fixed;
bottom:20px;
right:20px;
padding:15px 25px;
border-radius:50px;
text-decoration:none;
color:black;
font-weight:bold;
background:linear-gradient(90deg,gold,silver,gold);
background-size:300%;
animation:btnMove 3s linear infinite;
}

</style>
</head>

<body>

<header>PRIME STRENGTH</header>

<div class="motivation">
Train Hard • Stay Strong • Become Prime
</div>

<div class="search-box">
<input type="text" id="search" placeholder="Search product..." onkeyup="searchProduct()">
</div>

<div class="container" id="shop"></div>

<a class="whatsapp" href="https://wa.me/96171710258" target="_blank">
WhatsApp Order
</a>

<script>

/* ================= PRODUCT CONTROL PANEL ================= */
/* ⭐⭐⭐ YOU EDIT ONLY HERE ⭐⭐⭐ */

const productsData = {

Boxing:[
{name:"Prime Boxing Gloves",price:"28$"},
{name:"Boxing Pads",price:"25$"},
{name:"Hand Wraps",price:"8$"},
{name:"Mouth Guard",price:"6$"},
{name:"Speed Rope",price:"12$"},
{name:"Punching Bag",price:"70$"},
{name:"Head Guard",price:"30$"},
{name:"Boxing Shorts",price:"20$"},
{name:"Training Gloves",price:"24$"},
{name:"Reflex Ball",price:"10$"}
],

Fitness:[
{name:"Resistance Bands",price:"15$"},
{name:"Yoga Mat",price:"18$"},
{name:"Dumbbells",price:"40$"},
{name:"Jump Rope",price:"9$"},
{name:"Push Up Board",price:"22$"},
{name:"Gym Gloves",price:"14$"},
{name:"Foam Roller",price:"17$"},
{name:"Kettlebell",price:"45$"},
{name:"Ab Wheel",price:"16$"},
{name:"Shaker Bottle",price:"7$"}
]

};

/* ========================================================= */

const shop=document.getElementById("shop");

Object.keys(productsData).forEach(sport=>{

let div=document.createElement("div");
div.className="sport";

let html=`<h2>${sport}</h2><div class="products">`;

productsData[sport].forEach((product,index)=>{

html+=`
<div class="product">

<img src="images/${sport}${index+1}.jpg">

<h4>${product.name}</h4>

<div class="price">${product.price}</div>

<button class="live-btn"
onclick="order('${product.name}')">
Order
</button>

</div>
`;
});

html+=`</div>`;
div.innerHTML=html;
shop.appendChild(div);

});

function order(product){
window.open(
`https://wa.me/96171710258?text=Hello I want ${product} from PRIME STRENGTH`
);
}

function searchProduct(){
let input=document.getElementById("search").value.toLowerCase();
let products=document.querySelectorAll(".product");

products.forEach(p=>{
p.style.display=
p.innerText.toLowerCase().includes(input)
? "block":"none";
});
}

</script>

</body>
</html>
